language: cpp
schema:
  inline: "CREATE TABLE region (\n    r_regionkey INTEGER NOT NULL,\n    r_name  \
    \    CHAR(25) NOT NULL,\n    r_comment   VARCHAR(152),\n    PRIMARY KEY (r_regionkey)\n\
    );\n\nCREATE TABLE nation (\n    n_nationkey INTEGER NOT NULL,\n    n_name   \
    \   CHAR(25) NOT NULL,\n    n_regionkey INTEGER NOT NULL,\n    n_comment   VARCHAR(152),\n\
    \    PRIMARY KEY (n_nationkey)\n);\n\nCREATE TABLE part (\n    p_partkey     INTEGER\
    \ NOT NULL,\n    p_name        VARCHAR(55) NOT NULL,\n    p_mfgr        CHAR(25)\
    \ NOT NULL,\n    p_brand       CHAR(10) NOT NULL,\n    p_type        VARCHAR(25)\
    \ NOT NULL,\n    p_size        INTEGER NOT NULL,\n    p_container   CHAR(10) NOT\
    \ NULL,\n    p_retailprice DECIMAL(15,2) NOT NULL,\n    p_comment     VARCHAR(23)\
    \ NOT NULL,\n    PRIMARY KEY (p_partkey)\n);\n\nCREATE TABLE supplier (\n    s_suppkey\
    \   INTEGER NOT NULL,\n    s_name      CHAR(25) NOT NULL,\n    s_address   VARCHAR(40)\
    \ NOT NULL,\n    s_nationkey INTEGER NOT NULL,\n    s_phone     CHAR(15) NOT NULL,\n\
    \    s_acctbal   DECIMAL(15,2) NOT NULL,\n    s_comment   VARCHAR(101) NOT NULL,\n\
    \    PRIMARY KEY (s_suppkey)\n);\n\nCREATE TABLE partsupp (\n    ps_partkey  \
    \  INTEGER NOT NULL,\n    ps_suppkey    INTEGER NOT NULL,\n    ps_availqty   INTEGER\
    \ NOT NULL,\n    ps_supplycost DECIMAL(15,2) NOT NULL,\n    ps_comment    VARCHAR(199)\
    \ NOT NULL,\n    PRIMARY KEY (ps_partkey, ps_suppkey)\n);\n\nCREATE TABLE customer\
    \ (\n    c_custkey    INTEGER NOT NULL,\n    c_name       VARCHAR(25) NOT NULL,\n\
    \    c_address    VARCHAR(40) NOT NULL,\n    c_nationkey  INTEGER NOT NULL,\n\
    \    c_phone      CHAR(15) NOT NULL,\n    c_acctbal    DECIMAL(15,2) NOT NULL,\n\
    \    c_mktsegment CHAR(10) NOT NULL,\n    c_comment    VARCHAR(117) NOT NULL,\n\
    \    PRIMARY KEY (c_custkey)\n);\n\nCREATE TABLE orders (\n    o_orderkey    \
    \  INTEGER NOT NULL,\n    o_custkey       INTEGER NOT NULL,\n    o_orderstatus\
    \   CHAR(1) NOT NULL,\n    o_totalprice    DECIMAL(15,2) NOT NULL,\n    o_orderdate\
    \     DATE NOT NULL,\n    o_orderpriority CHAR(15) NOT NULL,\n    o_clerk    \
    \     CHAR(15) NOT NULL,\n    o_shippriority  INTEGER NOT NULL,\n    o_comment\
    \       VARCHAR(79) NOT NULL,\n    PRIMARY KEY (o_orderkey)\n);\n\nCREATE TABLE\
    \ lineitem (\n    l_orderkey      INTEGER NOT NULL,\n    l_partkey       INTEGER\
    \ NOT NULL,\n    l_suppkey       INTEGER NOT NULL,\n    l_linenumber    INTEGER\
    \ NOT NULL,\n    l_quantity      DECIMAL(15,2) NOT NULL,\n    l_extendedprice\
    \ DECIMAL(15,2) NOT NULL,\n    l_discount      DECIMAL(15,2) NOT NULL,\n    l_tax\
    \           DECIMAL(15,2) NOT NULL,\n    l_returnflag    CHAR(1) NOT NULL,\n \
    \   l_linestatus    CHAR(1) NOT NULL,\n    l_shipdate      DATE NOT NULL,\n  \
    \  l_commitdate    DATE NOT NULL,\n    l_receiptdate   DATE NOT NULL,\n    l_shipinstruct\
    \  CHAR(25) NOT NULL,\n    l_shipmode      CHAR(10) NOT NULL,\n    l_comment \
    \      VARCHAR(44) NOT NULL,\n    PRIMARY KEY (l_orderkey, l_linenumber)\n);"
  path: null
queries:
  q1:
    sql: "select\n    l_returnflag,\n    l_linestatus,\n    sum(l_quantity) as sum_qty,\n\
      \    sum(l_extendedprice) as sum_base_price,\n    sum(l_extendedprice*(1-l_discount))\
      \ as sum_disc_price,\n    sum(l_extendedprice*(1-l_discount)*(1+l_tax)) as sum_charge,\n\
      \    avg(l_quantity) as avg_qty,\n    avg(l_extendedprice) as avg_price,\n \
      \   avg(l_discount) as avg_disc,\n    count(*) as count_order\nfrom\n    lineitem\n\
      where\n    l_shipdate <= date '1998-12-01' - interval '100' day\ngroup by\n\
      \    l_returnflag,\n    l_linestatus\norder by\n    l_returnflag,\n    l_linestatus;"
    path: null
    template: null
    parameters: null
  q2:
    sql: "select\n    s_acctbal,\n    s_name,\n    n_name,\n    p_partkey,\n    p_mfgr,\n\
      \    s_address,\n    s_phone,\n    s_comment\nfrom\n    part,\n    supplier,\n\
      \    partsupp,\n    nation,\n    region\nwhere\n    p_partkey = ps_partkey\n\
      \    and s_suppkey = ps_suppkey\n    and p_size = 8\n    and p_type like '%TIN'\n\
      \    and s_nationkey = n_nationkey\n    and n_regionkey = r_regionkey\n    and\
      \ r_name = 'ASIA'\n    and ps_supplycost = (\n        select\n            min(ps_supplycost)\n\
      \        from\n            partsupp, supplier,\n            nation, region\n\
      \        where\n            p_partkey = ps_partkey\n            and s_suppkey\
      \ = ps_suppkey\n            and s_nationkey = n_nationkey\n            and n_regionkey\
      \ = r_regionkey\n            and r_name = 'ASIA'\n        )\norder by\n    s_acctbal\
      \ desc,\n    n_name,\n    s_name,\n    p_partkey;"
    path: null
    template: null
    parameters: null
  q3:
    sql: "select\n    l_orderkey,\n    sum(l_extendedprice*(1-l_discount)) as revenue,\n\
      \    o_orderdate,\n    o_shippriority\nfrom\n    customer,\n    orders,\n  \
      \  lineitem\nwhere\n    c_mktsegment = 'BUILDING'\n    and c_custkey = o_custkey\n\
      \    and l_orderkey = o_orderkey\n    and o_orderdate < date '1995-03-08'\n\
      \    and l_shipdate > date '1995-03-08'\ngroup by\n    l_orderkey,\n    o_orderdate,\n\
      \    o_shippriority\norder by\n    revenue desc,\n    o_orderdate;"
    path: null
    template: null
    parameters: null
  q4:
    sql: "select\n    o_orderpriority,\n    count(*) as order_count\nfrom\n    orders\n\
      where\n    o_orderdate >= date '1993-09-01'\n    and o_orderdate < date '1993-09-01'\
      \ + interval '3' month\n    and exists (\n        select\n            *\n  \
      \      from\n            lineitem\n        where\n            l_orderkey = o_orderkey\n\
      \            and l_commitdate < l_receiptdate\n    )\ngroup by\n    o_orderpriority\n\
      order by\n    o_orderpriority;"
    path: null
    template: null
    parameters: null
  q5:
    sql: "select\n    n_name,\n    sum(l_extendedprice * (1 - l_discount)) as revenue\n\
      from\n    customer,\n    orders,\n    lineitem,\n    supplier,\n    nation,\n\
      \    region\nwhere\n    c_custkey = o_custkey\n    and l_orderkey = o_orderkey\n\
      \    and l_suppkey = s_suppkey\n    and c_nationkey = s_nationkey\n    and s_nationkey\
      \ = n_nationkey\n    and n_regionkey = r_regionkey\n    and r_name = 'AFRICA'\n\
      \    and o_orderdate >= date '1997-01-01'\n    and o_orderdate < date '1997-01-01'\
      \ + interval '1' year\ngroup by\n    n_name\norder by\n    revenue desc;"
    path: null
    template: null
    parameters: null
  q6:
    sql: "select\n    sum(l_extendedprice*l_discount) as revenue\nfrom\n    lineitem\n\
      where\n    l_shipdate >= date '1993-01-01'\n    and l_shipdate < date '1993-01-01'\
      \ + interval '1' year\n    and l_discount between 0.08 - 0.01 and 0.08 + 0.01\n\
      \    and l_quantity < 24;"
    path: null
    template: null
    parameters: null
  q7:
    sql: "select\n    supp_nation,\n    cust_nation,\n    l_year, sum(volume) as revenue\n\
      from (\n    select\n        n1.n_name as supp_nation,\n        n2.n_name as\
      \ cust_nation,\n        extract(year from l_shipdate) as l_year,\n        l_extendedprice\
      \ * (1 - l_discount) as volume\n    from\n        supplier,\n        lineitem,\n\
      \        orders,\n        customer,\n        nation n1,\n        nation n2\n\
      \    where\n        s_suppkey = l_suppkey\n        and o_orderkey = l_orderkey\n\
      \        and c_custkey = o_custkey\n        and s_nationkey = n1.n_nationkey\n\
      \        and c_nationkey = n2.n_nationkey\n        and (\n            (n1.n_name\
      \ = 'ALGERIA' and n2.n_name = 'BRAZIL')\n            or (n1.n_name = 'BRAZIL'\
      \ and n2.n_name = 'ALGERIA')\n        )\n        and l_shipdate between date\
      \ '1995-01-01' and date '1996-12-31'\n    ) as shipping\ngroup by\n    supp_nation,\n\
      \    cust_nation,\n    l_year\norder by\n    supp_nation,\n    cust_nation,\n\
      \    l_year;"
    path: null
    template: null
    parameters: null
  q8:
    sql: "select\n    o_year,\n    sum(case\n        when nation = 'FRANCE'\n    \
      \    then volume\n        else 0\n    end) / sum(volume) as mkt_share\nfrom\
      \ (\n    select\n        extract(year from o_orderdate) as o_year,\n       \
      \ l_extendedprice * (1-l_discount) as volume,\n        n2.n_name as nation\n\
      \    from\n        part,\n        supplier,\n        lineitem,\n        orders,\n\
      \        customer,\n        nation n1,\n        nation n2,\n        region\n\
      \    where\n        p_partkey = l_partkey\n        and s_suppkey = l_suppkey\n\
      \        and l_orderkey = o_orderkey\n        and o_custkey = c_custkey\n  \
      \      and c_nationkey = n1.n_nationkey\n        and n1.n_regionkey = r_regionkey\n\
      \        and r_name = 'AMERICA'\n        and s_nationkey = n2.n_nationkey\n\
      \        and o_orderdate between date '1995-01-01' and date '1996-12-31'\n \
      \       and p_type = 'ECONOMY BRUSHED TIN'\n    ) as all_nations\ngroup by\n\
      \    o_year\norder by\n    o_year;"
    path: null
    template: null
    parameters: null
  q9:
    sql: "select\n    nation,\n    o_year,\n    sum(amount) as sum_profit\nfrom (\n\
      \    select\n        n_name as nation,\n        extract(year from o_orderdate)\
      \ as o_year,\n        l_extendedprice * (1 - l_discount) - ps_supplycost * l_quantity\
      \ as amount\n    from\n        part,\n        supplier,\n        lineitem,\n\
      \        partsupp,\n        orders,\n        nation\n    where\n        s_suppkey\
      \ = l_suppkey\n        and ps_suppkey = l_suppkey\n        and ps_partkey =\
      \ l_partkey\n        and p_partkey = l_partkey\n        and o_orderkey = l_orderkey\n\
      \        and s_nationkey = n_nationkey\n        and p_name like '%rosy%'\n \
      \   ) as profit\ngroup by\n    nation,\n    o_year\norder by\n    nation,\n\
      \    o_year desc;"
    path: null
    template: null
    parameters: null
  q10:
    sql: "select\n    c_custkey,\n    c_name,\n    sum(l_extendedprice * (1 - l_discount))\
      \ as revenue,\n    c_acctbal,\n    n_name,\n    c_address,\n    c_phone,\n \
      \   c_comment\nfrom\n    customer,\n    orders,\n    lineitem,\n    nation\n\
      where\n    c_custkey = o_custkey\n    and l_orderkey = o_orderkey\n    and o_orderdate\
      \ >= date '1993-08-01'\n    and o_orderdate < date '1993-08-01' + interval '3'\
      \ month\n    and l_returnflag = 'R'\n    and c_nationkey = n_nationkey\ngroup\
      \ by\n    c_custkey,\n    c_name,\n    c_acctbal,\n    c_phone,\n    n_name,\n\
      \    c_address,\n    c_comment\norder by\n    revenue desc;"
    path: null
    template: null
    parameters: null
  q11:
    sql: "select\n    ps_partkey,\n    sum(ps_supplycost * ps_availqty) as value\n\
      from\n    partsupp,\n    supplier,\n    nation\nwhere\n    ps_suppkey = s_suppkey\n\
      \    and s_nationkey = n_nationkey\n    and n_name = 'RUSSIA'\ngroup by\n  \
      \  ps_partkey having\n        sum(ps_supplycost * ps_availqty) > (\n       \
      \     select\n                sum(ps_supplycost * ps_availqty) * 0.0001\n  \
      \          from\n                partsupp,\n                supplier,\n    \
      \            nation\n            where\n                ps_suppkey = s_suppkey\n\
      \                and s_nationkey = n_nationkey\n                and n_name =\
      \ 'RUSSIA'\n        )\norder by\n    value desc;"
    path: null
    template: null
    parameters: null
  q12:
    sql: "select\n    l_shipmode,\n    sum(case\n        when o_orderpriority ='1-URGENT'\n\
      \            or o_orderpriority ='2-HIGH'\n        then 1\n        else 0\n\
      \    end) as high_line_count,\n    sum(case\n        when o_orderpriority <>\
      \ '1-URGENT'\n            and o_orderpriority <> '2-HIGH'\n        then 1\n\
      \        else 0\n    end) as low_line_count\nfrom\n    orders,\n    lineitem\n\
      where\n    o_orderkey = l_orderkey\n    and l_shipmode in ('MAIL', 'FOB')\n\
      \    and l_commitdate < l_receiptdate\n    and l_shipdate < l_commitdate\n \
      \   and l_receiptdate >= date '1997-01-01'\n    and l_receiptdate < date '1997-01-01'\
      \ + interval '1' year\ngroup by\n    l_shipmode\norder by\n    l_shipmode;"
    path: null
    template: null
    parameters: null
  q13:
    sql: "select\n    c_count, count(*) as custdist\nfrom (\n    select\n        c_custkey,\n\
      \        count(o_orderkey)\n    from\n        customer left outer join orders\
      \ on\n            c_custkey = o_custkey\n            and o_comment not like\
      \ '%express%requests%'\n    group by\n        c_custkey\n    ) as c_orders (c_custkey,\
      \ c_count)\ngroup by\n    c_count\norder by\n    custdist desc,\n    c_count\
      \ desc;"
    path: null
    template: null
    parameters: null
  q14:
    sql: "select\n    100.00 * sum(case\n        when p_type like 'PROMO%'\n     \
      \   then l_extendedprice*(1-l_discount)\n        else 0\n    end) / sum(l_extendedprice\
      \ * (1 - l_discount)) as promo_revenue\nfrom\n    lineitem,\n    part\nwhere\n\
      \    l_partkey = p_partkey\n    and l_shipdate >= date '1995-05-01'\n    and\
      \ l_shipdate < date '1995-05-01' + interval '1' month;"
    path: null
    template: null
    parameters: null
  q15:
    sql: "with revenue (supplier_no, total_revenue) as (\n    select\n        l_suppkey,\n\
      \        sum(l_extendedprice * (1 - l_discount))\n    from\n        lineitem\n\
      \    where\n        l_shipdate >= date '1996-02-01'\n        and l_shipdate\
      \ < date '1996-02-01' + interval '3' month\n    group by\n        l_suppkey\n\
      )\nselect\n    s_suppkey,\n    s_name,\n    s_address,\n    s_phone,\n    total_revenue\n\
      from\n    supplier,\n    revenue\nwhere\n    s_suppkey = supplier_no\n    and\
      \ total_revenue = (\n        select\n            max(total_revenue)\n      \
      \  from\n            revenue\n    )\norder by\n    s_suppkey;"
    path: null
    template: null
    parameters: null
  q16:
    sql: "select\n    p_brand,\n    p_type,\n    p_size,\n    count(distinct ps_suppkey)\
      \ as supplier_cnt\nfrom\n    partsupp,\n    part\nwhere\n    p_partkey = ps_partkey\n\
      \    and p_brand <> 'Brand#31'\n    and p_type not like 'SMALL POLISHED%'\n\
      \    and p_size in (22, 18, 10, 14, 50, 7, 6, 25)\n    and ps_suppkey not in\
      \ (\n        select\n            s_suppkey\n        from\n            supplier\n\
      \        where\n            s_comment like '%Customer%Complaints%'\n    )\n\
      group by\n    p_brand,\n    p_type,\n    p_size\norder by\n    supplier_cnt\
      \ desc,\n    p_brand,\n    p_type,\n    p_size;"
    path: null
    template: null
    parameters: null
  q17:
    sql: "select\n    sum(l_extendedprice) / 7.0 as avg_yearly\nfrom\n    lineitem,\n\
      \    part\nwhere\n    p_partkey = l_partkey\n    and p_brand = 'Brand#13'\n\
      \    and p_container = 'MED BOX'\n    and l_quantity < (\n        select\n \
      \           0.2 * avg(l_quantity)\n        from\n            lineitem\n    \
      \    where\n            l_partkey = p_partkey\n    );"
    path: null
    template: null
    parameters: null
  q18:
    sql: "select\n    c_name,\n    c_custkey,\n    o_orderkey,\n    o_orderdate,\n\
      \    o_totalprice,\n    sum(l_quantity)\nfrom\n    customer,\n    orders,\n\
      \    lineitem\nwhere\n    o_orderkey in (\n        select\n            l_orderkey\n\
      \        from\n            lineitem\n        group by\n            l_orderkey\
      \ having\n                sum(l_quantity) > 314\n    )\n    and c_custkey =\
      \ o_custkey\n    and o_orderkey = l_orderkey\ngroup by\n    c_name,\n    c_custkey,\n\
      \    o_orderkey,\n    o_orderdate,\n    o_totalprice\norder by\n    o_totalprice\
      \ desc,\n    o_orderdate;"
    path: null
    template: null
    parameters: null
  q19:
    sql: "select\n    sum(l_extendedprice * (1 - l_discount)) as revenue\nfrom\n \
      \   lineitem,\n    part\nwhere\n    (\n        p_partkey = l_partkey\n     \
      \   and p_brand = 'Brand#14'\n        and p_container in ('SM CASE', 'SM BOX',\
      \ 'SM PACK', 'SM PKG')\n        and l_quantity >= 1 and l_quantity <= 1 + 10\n\
      \        and p_size between 1 and 5\n        and l_shipmode in ('AIR', 'AIR\
      \ REG')\n        and l_shipinstruct = 'DELIVER IN PERSON'\n    )\n    or\n \
      \   (\n        p_partkey = l_partkey\n        and p_brand = 'Brand#15'\n   \
      \     and p_container in ('MED BAG', 'MED BOX', 'MED PKG', 'MED PACK')\n   \
      \     and l_quantity >= 17 and l_quantity <= 17 + 10\n        and p_size between\
      \ 1 and 10\n        and l_shipmode in ('AIR', 'AIR REG')\n        and l_shipinstruct\
      \ = 'DELIVER IN PERSON'\n    )\n    or\n    (\n        p_partkey = l_partkey\n\
      \        and p_brand = 'Brand#35'\n        and p_container in ('LG CASE', 'LG\
      \ BOX', 'LG PACK', 'LG PKG')\n        and l_quantity >= 28 and l_quantity <=\
      \ 28 + 10\n        and p_size between 1 and 15\n        and l_shipmode in ('AIR',\
      \ 'AIR REG')\n        and l_shipinstruct = 'DELIVER IN PERSON'\n    );"
    path: null
    template: null
    parameters: null
  q20:
    sql: "select\n    s_name,\n    s_address\nfrom\n    supplier, nation\nwhere\n\
      \    s_suppkey in (\n        select\n            ps_suppkey\n        from\n\
      \            partsupp\n        where\n            ps_partkey in (\n        \
      \        select\n                    p_partkey\n                from\n     \
      \               part\n                where\n                    p_name like\
      \ 'linen%'\n            )\n            and ps_availqty > (\n               \
      \ select\n                    0.5 * sum(l_quantity)\n                from\n\
      \                    lineitem\n                where\n                    l_partkey\
      \ = ps_partkey\n                    and l_suppkey = ps_suppkey\n           \
      \         and l_shipdate >= date('1997-01-01')\n                    and l_shipdate\
      \ < date('1997-01-01') + interval '1' year\n            )\n    )\n    and s_nationkey\
      \ = n_nationkey\n    and n_name = 'FRANCE'\norder by\n    s_name;"
    path: null
    template: null
    parameters: null
  q21:
    sql: "select\n    s_name,\n    count(*) as numwait\nfrom\n    supplier,\n    lineitem\
      \ l1,\n    orders,\n    nation\nwhere\n    s_suppkey = l1.l_suppkey\n    and\
      \ o_orderkey = l1.l_orderkey\n    and o_orderstatus = 'F'\n    and l1.l_receiptdate\
      \ > l1.l_commitdate\n    and exists (\n        select *\n        from\n    \
      \        lineitem l2\n        where\n            l2.l_orderkey = l1.l_orderkey\n\
      \            and l2.l_suppkey <> l1.l_suppkey\n    )\n    and not exists (\n\
      \        select *\n        from\n            lineitem l3\n        where\n  \
      \          l3.l_orderkey = l1.l_orderkey\n            and l3.l_suppkey <> l1.l_suppkey\n\
      \            and l3.l_receiptdate > l3.l_commitdate\n    )\n    and s_nationkey\
      \ = n_nationkey\n    and n_name = 'RUSSIA'\ngroup by\n    s_name\norder by\n\
      \    numwait desc,\n    s_name;"
    path: null
    template: null
    parameters: null
  q22:
    sql: "select\n    cntrycode,\n    count(*) as numcust,\n    sum(c_acctbal) as\
      \ totacctbal\nfrom (\n    select\n        substring(c_phone from 1 for 2) as\
      \ cntrycode,\n        c_acctbal\n    from\n        customer\n    where\n   \
      \     substring(c_phone from 1 for 2) in\n            ('13','17','31','23','18','29','30')\n\
      \        and c_acctbal > (\n            select\n                avg(c_acctbal)\n\
      \            from\n                customer\n            where\n           \
      \     c_acctbal > 0.00\n                and substring(c_phone from 1 for 2)\
      \ in\n                    ('13','17','31','23','18','29','30')\n        )\n\
      \        and not exists (\n            select *\n            from\n        \
      \        orders\n            where\n                o_custkey = c_custkey\n\
      \        )\n    ) as custsale\ngroup by\n    cntrycode\norder by\n    cntrycode;"
    path: null
    template: null
    parameters: null
